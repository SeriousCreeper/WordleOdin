name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Raylib dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libx11-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev \
            libxinerama-dev libwayland-dev libxkbcommon-dev

      - name: Build
        run: |
          mkdir -p builds
          odin build . -out:builds/wordle-odin

      - name: Package
        run: |
          mkdir -p dist/linux
          cp builds/wordle-odin dist/linux/
          cp -r assets dist/linux/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wordle-linux
          path: dist/linux

  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        run: |
          mkdir -p builds
          odin build . -out:builds/wordle-odin.exe

      - name: Package
        shell: bash
        run: |
          mkdir -p dist/windows
          cp builds/wordle-odin.exe dist/windows/
          cp -r assets dist/windows/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wordle-windows
          path: dist/windows
